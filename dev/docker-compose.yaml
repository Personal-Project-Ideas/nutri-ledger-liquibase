version: "3.9"

services:
  nutri_ledger_pg:
    image: postgres:15-alpine
    env_file:
      - ../.env
    volumes:
      - nutri_ledger_pg_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - nutriLedger-net

  nutri_ledger_mongo:
    image: mongo:7.0
    env_file:
      - ../.env
    ports:
      - "27018:27017"
    volumes:
      - nutri_ledger_mongo_data:/data/db
    networks:
      - nutriLedger-net

  liquibase_nutri_ledger:
    build:
      context: ..
      dockerfile: Dockerfile
    env_file:
      - ../.env
    depends_on:
      - nutri_ledger_pg
    volumes:
      - ../changelog.yaml:/changelog.yaml:ro
      - ../migrations:/migrations:ro
      - ../liquibase.properties:/liquibase.properties:ro
    command: update
    networks:
      - nutriLedger-net

volumes:
  nutri_ledger_pg_data:
    driver: local
  nutri_ledger_mongo_data:
    driver: local

networks:
  nutriLedger-net:
    driver: bridge
