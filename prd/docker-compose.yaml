version: "3.9"

services:
  mongo:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - trainingLog-net
  liquibase:
    build:
      context: ../
      dockerfile: Dockerfile
    env_file:
      - ../.env
    environment:
      LIQUIBASE_URL: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=require
      LIQUIBASE_USERNAME: ${POSTGRES_USER}
      LIQUIBASE_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ../changelog.yaml:/changelog.yaml:ro
      - ../migrations:/migrations:ro
      - ../liquibase.properties:/liquibase.properties:ro
    command: update
    networks:
      - trainingLog-net

networks:
  trainingLog-net:
    driver: bridge

volumes:
  mongo-data:
    driver: local
